name: Update Site

on:
  workflow_dispatch:
  schedule:
    # Время в UTC (МСК минус 3 часа): 08:00, 10:20, 13:00, 15:00
    - cron: '0 8 * * *'   # 11:00 МСК
    - cron: '20 10 * * *' # 13:20 МСК
    - cron: '0 13 * * *'  # 16:00 МСК
    - cron: '0 15 * * *'  # 18:00 МСК

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install pandas

      - name: Run update script
        run: python update.py

      - name: Sync files to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: /
          port: 21
          # Исключаем лишние файлы, чтобы не нагружать сервер
          exclude: |
            **/.git*
            **/.github*
            update.py
            data.csv
            README.md
