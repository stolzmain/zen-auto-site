name: Update Site

on:
  workflow_dispatch:
  schedule:
    # Запуск в начале каждого второго часа (00:00, 02:00, 04:00 и т.д. по UTC)
    - cron: '0 */2 * * *'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    # Даем роботу права на запись, чтобы он мог сохранять обновленные файлы в репозиторий
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests

      - name: Run update script
        run: python update.py

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Автоматическое обновление контента сайта"
          file_pattern: 'index.html sitemap.xml rss.xml robots.txt'
